services:
  codex-gate:
    build:
      context: .
      dockerfile: Dockerfile
    image: codex-gate:local
    container_name: codex-gate
    restart: unless-stopped
    ports:
      - "${CODEX_GATE_PORT:-8080}:8080"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN in .env}
      MASTER_KEY: ${MASTER_KEY:-}
      LISTEN_ADDR: ${LISTEN_ADDR:-0.0.0.0:8080}
      STATIC_DIR: ${STATIC_DIR:-/app/static}
      DB_DSN: ${DB_DSN:-sqlite:///app/data/codex_gate.sqlite}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      RUST_LOG: ${RUST_LOG:-info}
      INJECT_INCLUDE_USAGE: ${INJECT_INCLUDE_USAGE:-true}
      API_KEY_CACHE_TTL_MS: ${API_KEY_CACHE_TTL_MS:-30000}
      API_KEY_CACHE_MAX_ENTRIES: ${API_KEY_CACHE_MAX_ENTRIES:-100000}
      UPSTREAM_CACHE_TTL_MS: ${UPSTREAM_CACHE_TTL_MS:-2000}
      UPSTREAM_CACHE_STALE_GRACE_MS: ${UPSTREAM_CACHE_STALE_GRACE_MS:-30000}
      MAX_REQUEST_BYTES: ${MAX_REQUEST_BYTES:-10485760}
      USAGE_CAPTURE_BYTES: ${USAGE_CAPTURE_BYTES:-2097152}
      USAGE_CAPTURE_TAIL_BYTES: ${USAGE_CAPTURE_TAIL_BYTES:-1048576}
      LOG_QUEUE_CAPACITY: ${LOG_QUEUE_CAPACITY:-2048}
      STATS_FLUSH_INTERVAL_MS: ${STATS_FLUSH_INTERVAL_MS:-2000}
      ENDPOINT_SELECTOR_STRATEGY: ${ENDPOINT_SELECTOR_STRATEGY:-weighted}
      CIRCUIT_BREAKER_FAILURE_THRESHOLD: ${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-3}
      CIRCUIT_BREAKER_OPEN_MS: ${CIRCUIT_BREAKER_OPEN_MS:-30000}
      UPSTREAM_CONNECT_TIMEOUT_MS: ${UPSTREAM_CONNECT_TIMEOUT_MS:-2000}
      UPSTREAM_REQUEST_TIMEOUT_MS: ${UPSTREAM_REQUEST_TIMEOUT_MS:-120000}
      REQUEST_LOG_RETENTION_DAYS: ${REQUEST_LOG_RETENTION_DAYS:-30}
      STATS_DAILY_RETENTION_DAYS: ${STATS_DAILY_RETENTION_DAYS:-400}
      RETENTION_CLEANUP_INTERVAL_MS: ${RETENTION_CLEANUP_INTERVAL_MS:-21600000}
      RETENTION_DELETE_BATCH: ${RETENTION_DELETE_BATCH:-2000}
      REQUEST_LOG_ARCHIVE_ENABLED: ${REQUEST_LOG_ARCHIVE_ENABLED:-false}
      REQUEST_LOG_ARCHIVE_DIR: ${REQUEST_LOG_ARCHIVE_DIR:-/app/data/archive/request_logs}
      REQUEST_LOG_ARCHIVE_COMPRESS: ${REQUEST_LOG_ARCHIVE_COMPRESS:-true}
    volumes:
      - codex-gate-data:/app/data

volumes:
  codex-gate-data:
